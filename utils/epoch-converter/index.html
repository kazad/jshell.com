<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epoch Converter | JShell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../tool.css">
    <script src="../state.js"></script>
    <script src="../ui.js"></script>
    <style>
        .preset-btn {
            @apply px-3 py-1 bg-bg border border-border text-[10px] font-bold uppercase tracking-wider hover:border-text-muted transition-colors;
        }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="tool-header">
        <a href="../../index_new.html" class="back-link">← Dashboard</a>
        <div class="tool-title">Epoch Converter</div>
        <div class="tool-actions">
            <button class="btn primary" onclick="JShellState.copyLink()">Copy Stateless Link</button>
        </div>
    </header>

    <div class="tool-container overflow-hidden">
        <div class="flex-grow flex flex-col p-4 gap-4 overflow-y-auto">
            <div id="unixPanel" class="flex-1 min-h-[120px]">
                <textarea id="unixInput" placeholder="Unix Timestamp (Seconds)..." spellcheck="false"></textarea>
            </div>
            <div id="isoPanel" class="flex-1 min-h-[120px]">
                <textarea id="isoInput" placeholder="ISO 8601 Date..." spellcheck="false"></textarea>
            </div>
            <div id="localPanel" class="flex-1 min-h-[120px]">
                <textarea id="localInput" placeholder="Local Time String..." spellcheck="false"></textarea>
            </div>
        </div>
        <div class="settings-pane">
            <div class="setting-group">
                <label class="block text-[11px] font-bold text-[var(--color-text-muted)] uppercase mb-2">Current Epoch</label>
                <code id="currentEpoch" class="text-xl text-[var(--color-text-main)] font-mono"></code>
            </div>
            <div class="setting-group">
                <label class="block text-[11px] font-bold text-[var(--color-text-muted)] uppercase mb-2">Presets</label>
                <div class="flex flex-wrap gap-2">
                    <button class="preset-btn" onclick="setToNow()">Now</button>
                    <button class="preset-btn" onclick="setToToday()">Today</button>
                    <button class="preset-btn" onclick="setToEpochZero()">Epoch 0</button>
                </div>
            </div>
            <div class="setting-group">
                <label class="block text-[11px] font-bold text-[var(--color-text-muted)] uppercase mb-2">Info</label>
                <p class="text-xs text-[var(--color-text-muted)] leading-relaxed">Bi-directional sync. Modify any field to update the others instantly.</p>
            </div>
            <div id="error" class="text-red-500 text-xs mt-auto"></div>
        </div>
    </div>

    <script>
        const unixInput = document.getElementById('unixInput');
        const isoInput = document.getElementById('isoInput');
        const localInput = document.getElementById('localInput');
        const currentEpoch = document.getElementById('currentEpoch');
        const errorDiv = document.getElementById('error');

        function updateFromUnix() {
            const val = unixInput.value.trim();
            if (!val) return clearAll();
            const date = new Date(parseInt(val) * 1000);
            sync(date, 'unix');
        }

        function updateFromISO() {
            const val = isoInput.value.trim();
            if (!val) return clearAll();
            const date = new Date(val);
            sync(date, 'iso');
        }

        function updateFromLocal() {
            const val = localInput.value.trim();
            if (!val) return clearAll();
            const date = new Date(val);
            sync(date, 'local');
        }

        function sync(date, source) {
            errorDiv.textContent = '';
            if (date.toString() === "Invalid Date") {
                errorDiv.textContent = 'Invalid ' + source.toUpperCase() + ' input';
                return;
            }

            if (source !== 'unix') unixInput.value = Math.floor(date.getTime() / 1000);
            if (source !== 'iso') isoInput.value = date.toISOString();
            if (source !== 'local') localInput.value = date.toLocaleString();

            JShellState.save({ t: unixInput.value });
        }

        function clearAll() {
            unixInput.value = '';
            isoInput.value = '';
            localInput.value = '';
            errorDiv.textContent = '';
        }

        function setToNow() {
            const now = Math.floor(Date.now() / 1000);
            unixInput.value = now;
            updateFromUnix();
        }

        function setToToday() {
            const d = new Date();
            d.setHours(0,0,0,0);
            unixInput.value = Math.floor(d.getTime() / 1000);
            updateFromUnix();
        }

        function setToEpochZero() {
            unixInput.value = 0;
            updateFromUnix();
        }

        unixInput.addEventListener('input', updateFromUnix);
        isoInput.addEventListener('input', updateFromISO);
        localInput.addEventListener('input', updateFromLocal);

        setInterval(() => {
            currentEpoch.textContent = Math.floor(Date.now() / 1000);
        }, 1000);

        function applyTheme() {
            const theme = localStorage.getItem('jshell_theme') || 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
        }

        window.addEventListener('load', () => {
            JShellUI.initPanel('unixPanel', { label: 'Unix Timestamp', paste: true, clear: true, copy: true });
            JShellUI.initPanel('isoPanel', { label: 'ISO 8601 Date', paste: true, clear: true, copy: true });
            JShellUI.initPanel('localPanel', { label: 'Local Time String', paste: true, clear: true, copy: true });

            applyTheme();
            const state = JShellState.load();
            if (state) {
                unixInput.value = state.t || "";
                updateFromUnix();
            } else {
                setToNow();
            }
        });

        window.addEventListener('storage', (e) => { 
            if(e.key === 'jshell_theme') applyTheme(); 
        });
    </script>
</body>
</html>
