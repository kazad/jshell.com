<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Calculator | JShell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../tool.css">
    <script src="../state.js"></script>
    <script src="../ui.js"></script>
    <style>
        .calc-notebook { background: #000; font-family: 'JetBrains Mono', monospace; }
        .line-error { color: #ef4444; font-size: 12px; }
        #resultColumn { font-family: 'JetBrains Mono', monospace; line-height: 1.8; font-size: 18px; text-align: right; color: #10b981; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="tool-header">
        <div class="flex gap-2 items-center">
            <a href="../../index_new.html" class="back-link">← Dashboard</a>
            <span style="color: var(--color-border)">|</span>
            <div class="tool-title">Smart Math Notebook</div>
        </div>
        <div class="tool-actions">
            <button class="btn primary" onclick="JShellState.copyLink()">Share Link with Data</button>
        </div>
    </header>

    <div class="tool-container overflow-hidden">
        <div class="editor-pane" id="inputPanel">
            <textarea id="calcInput" class="monospace" placeholder="Type math here... e.g.\nprice = 100\ntax = 0.08\nprice * (1 + tax)" spellcheck="false" style="line-height: 1.8; font-size: 18px;"></textarea>
        </div>
        <div class="output-pane bg-black overflow-y-auto" id="outputPanel" style="max-width: 350px;">
            <div id="resultColumn" class="output-content p-5">
                <!-- Dynamic -->
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('calcInput');
        const resCol = document.getElementById('resultColumn');

        function evaluate() {
            const lines = input.value.split('\n');
            let html = '';
            const scope = {};

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) {
                    html += '<div style="height: 32.4px"></div>';
                    return;
                }

                try {
                    // Very simple evaluation using Function
                    let result;
                    if (trimmed.includes('=')) {
                        const parts = trimmed.split('=');
                        const varName = parts[0].trim();
                        const expr = parts.slice(1).join('=').trim();
                        const evalResult = new Function('scope', `with(scope) { return ${expr}; }`)(scope);
                        scope[varName] = evalResult;
                        result = evalResult;
                    } else {
                        result = new Function('scope', `with(scope) { return ${trimmed}; }`)(scope);
                    }

                    if (typeof result === 'number') {
                        html += `<div>${result.toLocaleString()}</div>`;
                    } else if (result === undefined) {
                        html += `<div>-</div>`;
                    } else {
                        html += `<div>${result}</div>`;
                    }
                } catch (e) {
                    html += `<div class="line-error" style="height: 32.4px">error</div>`;
                }
            });

            resCol.innerHTML = html;
            JShellState.save({ i: input.value });
        }

        function applyTheme() {
            const theme = localStorage.getItem('jshell_theme') || 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
        }

        input.addEventListener('input', evaluate);

        window.addEventListener('load', () => {
            JShellUI.initPanel('inputPanel', { label: 'Notebook Editor', paste: true, clear: true, copy: true });
            JShellUI.initPanel('outputPanel', { label: 'Results', copy: true, clear: false });

            applyTheme();
            const state = JShellState.load();
            if (state && state.i) {
                input.value = state.i;
            } else if (!state) {
                input.value = "items = 5\nprice = 19.99\n\nsubtotal = items * price\ntax = subtotal * 0.08\n\ntotal = subtotal + tax";
            }
            evaluate();
        });

        window.addEventListener('storage', (e) => { if(e.key === 'jshell_theme') applyTheme(); });
    </script>
</body>
</html>
