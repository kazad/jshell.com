<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Power-Tool | JShell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../tool.css">
    <script src="../state.js"></script>
    <script src="../ui.js"></script>
</head>
<body class="h-screen flex flex-col">
    <header class="tool-header">
        <div class="flex gap-2 items-center">
            <a href="../../index_new.html" class="back-link">← Dashboard</a>
            <span style="color: var(--color-border)">|</span>
            <div class="tool-title">JSON Power-Tool</div>
        </div>
        <div class="tool-actions">
            <button class="btn primary" onclick="JShellState.copyLink()">Share Link with Data</button>
        </div>
    </header>

    <div class="tool-container overflow-hidden">
        <div class="editor-pane" id="inputPanel">
            <textarea id="jsonInput" placeholder="Paste JSON here..." spellcheck="false"></textarea>
        </div>
        <div class="output-pane flex flex-col p-4 gap-4 overflow-y-auto">
            <div id="sortedPanel" class="flex-1 min-h-[200px]">
                <pre id="outSorted" class="monospace h-full"></pre>
            </div>
            <div id="originalPanel" class="flex-1 min-h-[200px]">
                <pre id="outOriginal" class="monospace h-full"></pre>
            </div>
            <div id="minPanel" class="flex-1 min-h-[200px]">
                <pre id="outMin" class="monospace h-full text-text-muted"></pre>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('jsonInput');
        const outSorted = document.getElementById('outSorted');
        const outOriginal = document.getElementById('outOriginal');
        const outMin = document.getElementById('outMin');

        function process() {
            const val = input.value.trim();
            if (!val) {
                [outSorted, outOriginal, outMin].forEach(el => el.textContent = '');
                return;
            }

            try {
                const parsed = JSON.parse(val);
                
                // Original order
                outOriginal.textContent = JSON.stringify(parsed, null, 2);
                
                // Sorted
                outSorted.textContent = JSON.stringify(sortObject(parsed), null, 2);
                
                // Minified
                outMin.textContent = JSON.stringify(parsed);

                JShellState.save({ i: val });
            } catch (e) {
                // Silence errors while typing
            }
        }

        function sortObject(obj) {
            if (obj === null || typeof obj !== 'object') return obj;
            if (Array.isArray(obj)) return obj.map(sortObject);
            return Object.keys(obj).sort().reduce((acc, key) => {
                acc[key] = sortObject(obj[key]);
                return acc;
            }, {});
        }

        function applyTheme() {
            const theme = localStorage.getItem('jshell_theme') || 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
        }

        input.addEventListener('input', process);

        window.addEventListener('load', () => {
            JShellUI.initPanel('inputPanel', { label: 'Input Raw JSON', paste: true, clear: true, copy: true });
            JShellUI.initPanel('sortedPanel', { label: 'Beautified (Sorted Keys)', copy: true, clear: false });
            JShellUI.initPanel('originalPanel', { label: 'Beautified (Original Order)', copy: true, clear: false });
            JShellUI.initPanel('minPanel', { label: 'Minified', copy: true, clear: false });

            applyTheme();
            const state = JShellState.load();
            if (state && state.i) {
                input.value = state.i;
                process();
            }
        });

        window.addEventListener('storage', (e) => { if(e.key === 'jshell_theme') applyTheme(); });
    </script>
</body>
</html>
