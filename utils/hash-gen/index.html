<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Generator | JShell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../tool.css">
    <script src="../state.js"></script>
    <script src="../ui.js"></script>
    <style>
        .hash-row { margin-bottom: 20px; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 8px; padding: 16px; }
        .hash-label { font-size: 11px; font-weight: 800; color: var(--color-text-muted); margin-bottom: 8px; text-transform: uppercase; display: flex; justify-content: space-between; letter-spacing: 1px; }
        .hash-value { font-size: 14px; word-break: break-all; color: var(--color-text-main); cursor: pointer; font-family: 'JetBrains Mono', monospace; }
        .hash-value:hover { color: var(--color-accent-blue); }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="tool-header">
        <a href="../../index_new.html" class="back-link">← Dashboard</a>
        <div class="tool-title">Multi-Hash Generator</div>
        <div class="tool-actions">
            <button class="btn primary" onclick="JShellState.copyLink()">Copy Stateless Link</button>
        </div>
    </header>

    <div class="tool-container">
        <div class="editor-pane" id="inputPanel">
            <textarea id="inputText" placeholder="Type text to generate all hashes..." spellcheck="false"></textarea>
        </div>
        <div class="output-pane overflow-y-auto" id="outputPanel">
            <div id="hashes" class="p-5">
                <div class="hash-row">
                    <div class="hash-label">SHA-256 <span style="font-weight: normal; opacity: 0.5;">Click to copy</span></div>
                    <div class="hash-value" id="sha256" onclick="copy(this)"></div>
                </div>
                <div class="hash-row">
                    <div class="hash-label">SHA-512 <span style="font-weight: normal; opacity: 0.5;">Click to copy</span></div>
                    <div class="hash-value" id="sha512" onclick="copy(this)"></div>
                </div>
                <div class="hash-row">
                    <div class="hash-label">SHA-1 <span style="font-weight: normal; opacity: 0.5;">Click to copy</span></div>
                    <div class="hash-value" id="sha1" onclick="copy(this)"></div>
                </div>
                <div class="hash-row">
                    <div class="hash-label">SHA-384 <span style="font-weight: normal; opacity: 0.5;">Click to copy</span></div>
                    <div class="hash-value" id="sha384" onclick="copy(this)"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('inputText');
        const algos = ['SHA-256', 'SHA-512', 'SHA-1', 'SHA-384'];

        async function generateAll() {
            const val = input.value;
            if (!val) {
                algos.forEach(a => {
                    const el = document.getElementById(a.toLowerCase().replace('-', ''));
                    if (el) el.textContent = '';
                });
                return;
            }

            const msgUint8 = new TextEncoder().encode(val);
            
            for (const algo of algos) {
                try {
                    const hashBuffer = await crypto.subtle.digest(algo, msgUint8);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                    const el = document.getElementById(algo.toLowerCase().replace('-', ''));
                    if (el) el.textContent = hashHex;
                } catch (e) { console.error(e); }
            }

            JShellState.save({ t: val });
        }

        function copy(el) {
            if (!el.textContent) return;
            navigator.clipboard.writeText(el.textContent);
            const originalColor = el.style.color;
            el.style.color = 'var(--color-success)';
            setTimeout(() => el.style.color = originalColor, 500);
        }

        input.addEventListener('input', generateAll);

        function applyTheme() {
            const theme = localStorage.getItem('jshell_theme') || 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
        }

        window.addEventListener('load', () => {
            JShellUI.initPanel('inputPanel', { label: 'Input Text', paste: true, clear: true, copy: true });
            JShellUI.initPanel('outputPanel', { label: 'Hashes', copy: false, clear: false });

            applyTheme();
            const state = JShellState.load();
            if (state) {
                input.value = state.t || "";
                generateAll();
            }
        });

        window.addEventListener('storage', (e) => { if(e.key === 'jshell_theme') applyTheme(); });
    </script>
</body>
</html>
