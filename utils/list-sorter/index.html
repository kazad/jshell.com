<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Sorter | JShell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../tool.css">
    <script src="../state.js"></script>
    <script src="../ui.js"></script>
    <style>
        .split-output { display: flex; flex-direction: column; height: 100%; overflow-y: auto; }
        .output-section { border-bottom: 1px solid var(--color-border); padding-bottom: 20px; margin-bottom: 20px; }
        .output-section:last-child { border-bottom: none; }
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: var(--color-header); border-radius: 4px; margin-bottom: 10px; border: 1px solid var(--color-border); }
        .section-title { font-size: 11px; font-weight: 800; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 1px; }
        textarea.out-area { height: 120px; width: 100%; background: transparent; border: none; color: var(--color-text-main); font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 0 16px; resize: none; outline: none; }
    </style>
</head>
<body>
    <header class="tool-header">
        <a href="../../index_new.html" class="back-link">← Dashboard</a>
        <div class="tool-title">Multi-List Sorter</div>
        <div class="tool-actions">
            <button class="btn primary" onclick="JShellState.copyLink()">Copy Stateless Link</button>
        </div>
    </header>

    <div class="tool-container">
        <div id="inputPanel" class="editor-pane">
            <textarea id="listInput" placeholder="Apple\nOrange\nBanana\nApple..." spellcheck="false"></textarea>
        </div>
        <div class="output-pane" style="padding: 20px;">
            <div class="split-output">
                <div class="output-section">
                    <div class="section-header">
                        <span class="section-title">Alphabetical (A-Z)</span>
                        <button class="btn" style="font-size: 10px; padding: 2px 6px;" onclick="copy(this, 'outAlpha')">Copy</button>
                    </div>
                    <textarea id="outAlpha" class="out-area" readonly></textarea>
                </div>
                <div class="output-section">
                    <div class="section-header">
                        <span class="section-title">Unique / De-duplicated</span>
                        <button class="btn" style="font-size: 10px; padding: 2px 6px;" onclick="copy(this, 'outUnique')">Copy</button>
                    </div>
                    <textarea id="outUnique" class="out-area" readonly></textarea>
                </div>
                <div class="output-section">
                    <div class="section-header">
                        <span class="section-title">Frequency (Highest first)</span>
                        <button class="btn" style="font-size: 10px; padding: 2px 6px;" onclick="copy(this, 'outFreq')">Copy</button>
                    </div>
                    <textarea id="outFreq" class="out-area" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('listInput');
        const outAlpha = document.getElementById('outAlpha');
        const outUnique = document.getElementById('outUnique');
        const outFreq = document.getElementById('outFreq');

        // Initialize JShell UI
        window.addEventListener('load', () => {
            JShellUI.initPanel('inputPanel', { label: 'Input List (One per line)' });
        });

        function process() {
            const raw = input.value.trim();
            if (!raw) {
                [outAlpha, outUnique, outFreq].forEach(el => el.value = '');
                return;
            }

            const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            // Alpha
            outAlpha.value = [...lines].sort((a,b) => a.localeCompare(b, undefined, {sensitivity: 'base'})).join('\n');
            
            // Unique
            const unique = [...new Set(lines)];
            outUnique.value = unique.sort().join('\n');

            // Frequency
            const freq = {};
            lines.forEach(l => freq[l] = (freq[l] || 0) + 1);
            const sortedFreq = Object.entries(freq).sort((a,b) => b[1] - a[1]);
            outFreq.value = sortedFreq.map(([val, count]) => `${val} (${count})`).join('\n');

            JShellState.save({ l: input.value });
        }

        function copy(btn, id) {
            navigator.clipboard.writeText(document.getElementById(id).value);
            const original = btn.textContent;
            btn.textContent = 'Copied!';
            btn.style.color = 'var(--color-success)';
            setTimeout(() => {
                btn.textContent = original;
                btn.style.color = 'var(--color-text-main)';
            }, 1000);
        }

        input.addEventListener('input', process);

        window.addEventListener('load', () => {
            const state = JShellState.load();
            if (state) {
                input.value = state.l || "";
                process();
            }
        });

        function applyTheme() {
            const theme = localStorage.getItem('jshell_theme') || 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
        }
        window.addEventListener('load', applyTheme);
        window.addEventListener('storage', (e) => { if(e.key === 'jshell_theme') applyTheme(); });
    </script>
</body>
</html>
