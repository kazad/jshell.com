<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Reader | JShell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../tool.css">
    <script src="../state.js"></script>
    <script src="../ui.js"></script>
    <style>
        .reader-viewport { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        .word-display { font-size: 84px; font-weight: 800; color: #fff; text-align: center; font-family: 'Inter', sans-serif; }
        .progress-bar { height: 4px; background: var(--color-border); position: absolute; top: 0; left: 0; right: 0; z-index: 10; }
        .progress-fill { height: 100%; background: #3b82f6; width: 0%; transition: width 0.1s; }
        body.light-theme .reader-viewport { background: #f0f0f0; }
        body.light-theme .word-display { color: #000; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="tool-header">
        <div class="flex gap-2 items-center">
            <a href="../../index_new.html" class="back-link">← Dashboard</a>
            <span style="color: var(--color-border)">|</span>
            <div class="tool-title">Speed Reader (Zoom)</div>
        </div>
        <div class="tool-actions">
            <button class="btn primary" id="startBtn" onclick="togglePlay()">Start</button>
            <button class="btn" onclick="JShellState.copyLink()">Share Link with Data</button>
        </div>
    </header>

    <div class="tool-container overflow-hidden">
        <div class="editor-pane" id="inputPanel">
            <textarea id="textInput" placeholder="Paste article or essay here..." spellcheck="true"></textarea>
        </div>
        <div class="output-pane bg-black relative" id="outputPanel">
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
            <div class="reader-viewport h-full">
                <div id="display" class="word-display">READY</div>
            </div>
        </div>
        <div class="settings-pane p-4 flex flex-col gap-6">
            <div class="setting-group">
                <label class="text-[10px] font-extrabold tracking-widest uppercase text-text-muted mb-2 block">Speed (WPM)</label>
                <input type="number" id="wpmInput" value="300" min="50" max="2000" step="50" class="w-full bg-black border border-border p-2 text-sm mb-2">
                <div class="flex gap-1 flex-wrap">
                    <button class="px-2 py-1 text-[10px] border border-border bg-bg hover:bg-bg-hover" onclick="setWPM(250)">250</button>
                    <button class="px-2 py-1 text-[10px] border border-border bg-bg hover:bg-bg-hover" onclick="setWPM(400)">400</button>
                    <button class="px-2 py-1 text-[10px] border border-border bg-bg hover:bg-bg-hover" onclick="setWPM(600)">600</button>
                </div>
            </div>
            <div class="setting-group">
                <label class="text-[10px] font-extrabold tracking-widest uppercase text-text-muted mb-2 block">Info</label>
                <p class="text-[11px] text-text-muted italic">Space: Play/Pause. Arrows: Change Speed. Focus on the center.</p>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('textInput');
        const display = document.getElementById('display');
        const wpmInput = document.getElementById('wpmInput');
        const progress = document.getElementById('progress');
        const startBtn = document.getElementById('startBtn');

        let words = [];
        let index = 0;
        let timer = null;
        let isPlaying = false;

        function togglePlay() {
            if (isPlaying) pause(); else play();
        }

        function play() {
            const raw = input.value.trim();
            if (!raw) return;
            
            if (words.length === 0 || index >= words.length) {
                words = raw.split(/\s+/);
                index = 0;
            }

            isPlaying = true;
            startBtn.textContent = 'Pause';
            nextWord();
        }

        function pause() {
            isPlaying = false;
            startBtn.textContent = 'Resume';
            clearTimeout(timer);
        }

        function nextWord() {
            if (!isPlaying || index >= words.length) {
                pause();
                if (index >= words.length) {
                    display.textContent = 'DONE';
                    index = 0;
                }
                return;
            }

            display.textContent = words[index];
            progress.style.width = ((index + 1) / words.length * 100) + '%';
            
            const delay = 60000 / parseInt(wpmInput.value);
            index++;
            timer = setTimeout(nextWord, delay);
        }

        function setWPM(val) {
            wpmInput.value = val;
            JShellState.save({ i: input.value, w: val });
        }

        function applyTheme() {
            const theme = localStorage.getItem('jshell_theme') || 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
        }

        // Global shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && document.activeElement !== input) {
                e.preventDefault();
                togglePlay();
            }
            if (e.key === 'ArrowUp') { 
                wpmInput.value = parseInt(wpmInput.value) + 50; 
                JShellState.save({ i: input.value, w: wpmInput.value });
            }
            if (e.key === 'ArrowDown') { 
                wpmInput.value = Math.max(50, parseInt(wpmInput.value) - 50); 
                JShellState.save({ i: input.value, w: wpmInput.value });
            }
        });

        input.addEventListener('input', () => {
            words = []; index = 0; 
            display.textContent = 'READY';
            progress.style.width = '0%';
            JShellState.save({ i: input.value, w: wpmInput.value });
        });

        wpmInput.addEventListener('input', () => {
            JShellState.save({ i: input.value, w: wpmInput.value });
        });

        window.addEventListener('load', () => {
            JShellUI.initPanel('inputPanel', { label: 'Text to Read', paste: true, clear: true, copy: false });
            JShellUI.initPanel('outputPanel', { label: 'Speed Reader View', copy: false, clear: false });

            applyTheme();
            const state = JShellState.load();
            if (state) {
                input.value = state.i || "";
                wpmInput.value = state.w || 300;
            }
        });

        window.addEventListener('storage', (e) => { if(e.key === 'jshell_theme') applyTheme(); });
    </script>
</body>
</html>
