<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Live | JShell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/tool.css">
    <script src="../assets/state.js"></script>
    <script src="../assets/ui.js"></script>
    <style>
        .markdown-body { color: var(--color-text-main); line-height: 1.6; }
        .markdown-body h1 { font-size: 2em; font-weight: 800; border-bottom: 1px solid var(--color-border); padding-bottom: 10px; margin-bottom: 16px; }
        .markdown-body h2 { font-size: 1.5em; font-weight: 700; border-bottom: 1px solid var(--color-border); padding-bottom: 8px; margin-bottom: 12px; }
        .markdown-body h3 { font-size: 1.25em; font-weight: 700; margin-bottom: 8px; }
        .markdown-body pre { background: var(--color-header); padding: 16px; border-radius: 8px; overflow-x: auto; border: 1px solid var(--color-border); margin-bottom: 16px; }
        .markdown-body code { background: var(--color-surface-hover); padding: 2px 4px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
        .markdown-body blockquote { border-left: 4px solid var(--color-border); padding-left: 16px; color: var(--color-text-muted); font-style: italic; margin-bottom: 16px; margin-left: 0; }
        .markdown-body ul, .markdown-body ol { padding-left: 24px; margin-bottom: 16px; }
        .markdown-body p { margin-bottom: 16px; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="tool-header">
        <div class="flex gap-2 items-center">
            <a href="../index.html" class="back-link">← Dashboard</a>
            <span style="color: var(--color-border)">|</span>
            <div class="tool-title">Markdown Preview</div>
        </div>
        <div class="tool-actions">
            <button class="btn primary" onclick="JShellState.copyLink()">Share Link with Data</button>
        </div>
    </header>

    <div class="tool-container overflow-hidden">
        <div class="editor-pane" id="inputPanel">
            <textarea id="markdownInput" placeholder="# Hello World\n\nStart typing markdown..." spellcheck="true"></textarea>
        </div>
        <div class="output-pane overflow-y-auto bg-black" id="outputPanel">
            <div id="markdownOutput" class="markdown-body output-content overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('markdownInput');
        const output = document.getElementById('markdownOutput');

        function parseMarkdown(md) {
            // Very simple markdown parser using regex
            let html = md
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                .replace(/!\[(.*?)\]\((.*?)\)/gim, "<img alt='$1' src='$2'>")
                .replace(/\[(.*?)\]\((.*?)\)/gim, "<a href='$2'>$1</a>")
                .replace(/\n\s*\n/g, '<p></p>')
                .replace(/\n/g, '<br>');

            return html;
        }

        function update() {
            output.innerHTML = parseMarkdown(input.value);
            JShellState.save({ i: input.value });
        }

        function applyTheme() {
            const theme = localStorage.getItem('jshell_theme') || 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
        }

        input.addEventListener('input', update);

        window.addEventListener('load', () => {
            JShellUI.initPanel('inputPanel', { label: 'Markdown Editor', paste: true, clear: true, copy: true });
            JShellUI.initPanel('outputPanel', { label: 'Live Preview', copy: false, clear: false });

            applyTheme();
            const state = JShellState.load();
            if (state && state.i) {
                input.value = state.i;
                update();
            }
        });

        window.addEventListener('storage', (e) => { if(e.key === 'jshell_theme') applyTheme(); });
    </script>
</body>
</html>
