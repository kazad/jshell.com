<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Playground | JShell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/tool.css">
    <script src="../assets/state.js"></script>
    <script src="../assets/ui.js"></script>
    <style>
        .console-line { padding: 8px 16px; border-bottom: 1px solid var(--color-border); font-size: 13px; font-family: 'JetBrains Mono', monospace; white-space: pre-wrap; word-break: break-all; }
        .console-log { color: var(--color-text-main); }
        .console-warn { color: #fbbf24; background: rgba(251, 191, 36, 0.05); }
        .console-error { color: #f87171; background: rgba(248, 113, 113, 0.05); }
        .console-info { color: #60a5fa; background: rgba(96, 165, 250, 0.05); }
        .console-result { color: var(--color-success); border-top: 1px solid var(--color-border); margin-top: 8px; font-weight: 700; background: rgba(0, 255, 136, 0.05); }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="tool-header">
        <a href="../index.html" class="back-link">← Dashboard</a>
        <div class="tool-title">JS Playground</div>
        <div class="tool-actions">
            <button class="btn" onclick="clearConsole()">Clear Console</button>
            <button class="btn primary" onclick="runCode()">Run (⌘+Enter)</button>
            <button class="btn" onclick="JShellState.copyLink()">Stateless Link</button>
        </div>
    </header>

    <div class="tool-container overflow-hidden">
        <div class="editor-pane" id="editorPanel">
            <textarea id="codeInput" placeholder="// Write some JS here...&#10;console.log('Hello JShell');&#10;const x = 10;&#10;x * 2;" spellcheck="false"></textarea>
        </div>
        <div class="output-pane flex flex-col" id="consolePanel">
            <div id="consoleOutput" class="output-content monospace overflow-y-auto h-full"></div>
        </div>
        <div class="settings-pane">
            <div class="setting-group">
                <label class="block text-[11px] font-bold text-[var(--color-text-muted)] uppercase mb-2">Info</label>
                <p class="text-xs text-[var(--color-text-muted)] leading-relaxed">Sandboxed eval with browser window access.</p>
            </div>
            <div class="setting-group">
                <label class="flex items-center gap-2 text-xs font-bold text-[var(--color-text-muted)] uppercase cursor-pointer">
                    <input type="checkbox" id="autoRun" checked class="w-4 h-4 rounded border-[var(--color-border)] bg-black"> Auto-run
                </label>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('codeInput');
        const consoleOut = document.getElementById('consoleOutput');
        const autoRunCheck = document.getElementById('autoRun');

        function save() {
            JShellState.save({ code: input.value });
        }

        function logToConsole(args, type = 'log') {
            const line = document.createElement('div');
            line.className = `console-line console-${type}`;
            line.textContent = Array.from(args).map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg, null, 2) : arg
            ).join(' ');
            consoleOut.appendChild(line);
            consoleOut.scrollTop = consoleOut.scrollHeight;
        }

        function clearConsole() {
            consoleOut.innerHTML = '';
        }

        function runCode() {
            const code = input.value;
            clearConsole();

            const customConsole = {
                log: (...args) => logToConsole(args, 'log'),
                warn: (...args) => logToConsole(args, 'warn'),
                error: (...args) => logToConsole(args, 'error'),
                info: (...args) => logToConsole(args, 'info'),
            };

            try {
                const result = eval(`(function(console) { 
                    try { 
                        return (function() { 
                            "use strict"; 
                            ${code} 
                        })(); 
                    } catch(e) { throw e; } 
                })(customConsole)`);

                if (result !== undefined) {
                    const resLine = document.createElement('div');
                    resLine.className = 'console-line console-result';
                    resLine.textContent = `Result: ${typeof result === 'object' ? JSON.stringify(result, null, 2) : result}`;
                    consoleOut.appendChild(resLine);
                }
                save();
            } catch (e) {
                logToConsole([e.message], 'error');
            }
        }

        function applyTheme() {
            const theme = localStorage.getItem('jshell_theme') || 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
        }

        window.addEventListener('load', () => {
            JShellUI.initPanel('editorPanel', { label: 'JavaScript Editor', paste: true, clear: true, copy: true });
            JShellUI.initPanel('consolePanel', { label: 'Console Output', copy: true, clear: false });

            applyTheme();
            const state = JShellState.load();
            if (state) {
                input.value = state.code || "";
                runCode();
            }
        });

        window.addEventListener('storage', (e) => { 
            if(e.key === 'jshell_theme') applyTheme(); 
        });

        let debounce;
        input.addEventListener('input', () => {
            if (!autoRunCheck.checked) return;
            clearTimeout(debounce);
            debounce = setTimeout(runCode, 500);
        });

        input.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                e.preventDefault();
                runCode();
            }
        });
    </script>
</body>
</html>
