<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to JSON | JShell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/tool.css">
    <script src="../assets/lz-string.js"></script>
    <script src="../assets/state.js"></script>
    <script src="../assets/ui.js"></script>
</head>
<body class="h-screen flex flex-col">
    <header class="tool-header">
        <a href="../index.html" class="back-link">← Dashboard</a>
        <div class="tool-title">CSV / JSON Converter</div>
        <div class="tool-actions">
            <button class="btn primary" onclick="JShellState.copyLink()">Copy Stateless Link</button>
        </div>
    </header>

    <div class="tool-container">
        <div class="editor-pane" id="csvPanel">
            <textarea id="csvInput" placeholder="id,name,email&#10;1,John,john@example.com" spellcheck="false"></textarea>
        </div>
        <div class="output-pane" id="jsonPanel">
            <textarea id="jsonInput" placeholder='[{"id":"1", "name":"John"}]' spellcheck="false"></textarea>
        </div>
        <div class="settings-pane">
            <div class="setting-group">
                <label class="block text-[11px] font-bold text-[var(--color-text-muted)] uppercase mb-2">Info</label>
                <p class="text-xs text-[var(--color-text-muted)] leading-relaxed">Bi-directional. Modifying CSV updates JSON instantly, and vice versa. Assuming first row is headers.</p>
            </div>
            <div id="error" class="text-red-500 text-xs mt-auto"></div>
        </div>
    </div>

    <script>
        const csvInput = document.getElementById('csvInput');
        const jsonInput = document.getElementById('jsonInput');
        const errorDiv = document.getElementById('error');

        function csvToJSON(csv) {
            const lines = csv.trim().split('\n');
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = line.split(',');
                return headers.reduce((obj, h, i) => {
                    obj[h] = values[i] ? values[i].trim() : "";
                    return obj;
                }, {});
            });
        }

        function jsonToCSV(json) {
            if (!Array.isArray(json) || json.length === 0) return "";
            const headers = Object.keys(json[0]);
            const headerRow = headers.join(',');
            const dataRows = json.map(obj => 
                headers.map(h => obj[h] === undefined ? "" : obj[h]).join(',')
            );
            return [headerRow, ...dataRows].join('\n');
        }

        function syncFromCSV() {
            errorDiv.textContent = '';
            try {
                const res = csvToJSON(csvInput.value);
                jsonInput.value = JSON.stringify(res, null, 2);
                saveState();
            } catch (e) {
                errorDiv.textContent = 'CSV Parse Error';
            }
        }

        function syncFromJSON() {
            errorDiv.textContent = '';
            try {
                const val = jsonInput.value.trim();
                if (!val) { csvInput.value = ""; return; }
                const res = JSON.parse(val);
                csvInput.value = jsonToCSV(res);
                saveState();
            } catch (e) {
                // Don't show error while typing
            }
        }

        function saveState() {
            JShellState.save({ c: csvInput.value });
        }

        function applyTheme() {
            const theme = localStorage.getItem('jshell_theme') || 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
        }

        csvInput.addEventListener('input', syncFromCSV);
        jsonInput.addEventListener('input', syncFromJSON);

        window.addEventListener('load', () => {
            JShellUI.initPanel('csvPanel', { label: 'CSV Data', paste: true, clear: true, copy: true });
            JShellUI.initPanel('jsonPanel', { label: 'JSON Array', paste: true, clear: true, copy: true });
            
            applyTheme();
            const state = JShellState.load();
            if (state) {
                csvInput.value = state.c || "";
                syncFromCSV();
            }
        });

        window.addEventListener('storage', (e) => { 
            if(e.key === 'jshell_theme') applyTheme(); 
        });
    </script>
</body>
</html>
