<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Snippets | JShell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/tool.css">
    <script src="../assets/state.js"></script>
    <script src="../assets/ui.js"></script>
    <style>
        .preview-area { background: #fff; height: 100%; width: 100%; border: none; }
        .snippet-list { display: flex; flex-direction: column; gap: 8px; }
        .snippet-card { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 6px; padding: 10px; cursor: pointer; transition: all 0.1s; }
        .snippet-card:hover { border-color: var(--color-text-muted); background: var(--color-surface-hover); }
        .snippet-name { font-size: 12px; font-weight: 700; color: var(--color-text-main); margin-bottom: 4px; }
        .snippet-date { font-size: 10px; color: var(--color-text-muted); }
        :fullscreen #previewContainer { padding: 0; background: #fff; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="tool-header">
        <a href="../index.html" class="back-link">← Dashboard</a>
        <div class="tool-title">HTML Snippet Manager</div>
        <div class="tool-actions">
            <button class="btn" onclick="saveSnippet()">Save Snippet</button>
            <button class="btn primary" onclick="JShellState.copyLink()">Copy Stateless Link</button>
        </div>
    </header>

    <div class="tool-container overflow-hidden">
        <div class="editor-pane" id="inputPanel">
            <textarea id="htmlInput" placeholder="Paste HTML here... CSS in <style> tags works too!" spellcheck="false"></textarea>
        </div>
        <div class="output-pane flex flex-col" id="previewPanel">
            <div id="previewContainer" class="flex-grow bg-[#eee] output-content overflow-hidden">
                <iframe id="preview" class="preview-area h-full w-full"></iframe>
            </div>
        </div>
        <div class="settings-pane">
            <div class="setting-group">
                <label class="block text-[11px] font-bold text-[var(--color-text-muted)] uppercase mb-2">Actions</label>
                <button class="btn w-full mb-2" onclick="toggleFullscreen()">Toggle Fullscreen Preview</button>
                <button class="btn w-full text-red-500 border-red-900" onclick="clearAll()">Delete All Saved</button>
            </div>
            <div class="setting-group flex-1 overflow-hidden flex flex-col">
                <label class="block text-[11px] font-bold text-[var(--color-text-muted)] uppercase mb-2">Saved Snippets</label>
                <div id="savedList" class="snippet-list overflow-y-auto">
                    <!-- Dynamic -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('htmlInput');
        const preview = document.getElementById('preview');
        const previewContainer = document.getElementById('previewContainer');
        const savedList = document.getElementById('savedList');

        function updatePreview() {
            const content = input.value;
            const doc = preview.contentDocument || preview.contentWindow.document;
            doc.open();
            doc.write(content);
            doc.close();
            JShellState.save({ h: content });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                previewContainer.requestFullscreen().catch(err => {
                    alert(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function saveSnippet() {
            const content = input.value;
            if (!content) return;
            const id = 'snip_' + Date.now();
            const name = prompt("Name this snippet:", "Snippet " + new Date().toLocaleTimeString());
            if (!name) return;

            const snippets = JSON.parse(localStorage.getItem('jshell_snippets') || '{}');
            snippets[id] = { name, content, date: new Date().toISOString() };
            localStorage.setItem('jshell_snippets', JSON.stringify(snippets));
            renderSaved();
        }

        function renderSaved() {
            const snippets = JSON.parse(localStorage.getItem('jshell_snippets') || '{}');
            savedList.innerHTML = Object.entries(snippets).map(([id, s]) => `
                <div class="snippet-card" onclick="loadSnippet('${id}')">
                    <div class="snippet-name">${s.name}</div>
                    <div class="snippet-date">${new Date(s.date).toLocaleDateString()}</div>
                </div>
            `).join('');
        }

        function loadSnippet(id) {
            const snippets = JSON.parse(localStorage.getItem('jshell_snippets') || '{}');
            if (snippets[id]) {
                input.value = snippets[id].content;
                updatePreview();
            }
        }

        function clearAll() {
            if (confirm("Delete all saved snippets from local storage?")) {
                localStorage.removeItem('jshell_snippets');
                renderSaved();
            }
        }

        input.addEventListener('input', updatePreview);

        function applyTheme() {
            const theme = localStorage.getItem('jshell_theme') || 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
        }

        window.addEventListener('load', () => {
            JShellUI.initPanel('inputPanel', { label: 'HTML / CSS Code', paste: true, clear: true, copy: true });
            JShellUI.initPanel('previewPanel', { label: 'Live Preview', copy: false, clear: false });

            renderSaved();
            applyTheme();
            const state = JShellState.load();
            if (state) {
                input.value = state.h || "";
                updatePreview();
            }
        });

        window.addEventListener('storage', (e) => { if(e.key === 'jshell_theme') applyTheme(); });
    </script>
</body>
</html>
