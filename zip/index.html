<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gzip (Base64) | JShell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/tool.css">
    <script src="../assets/lz-string.js"></script>
    <script src="../assets/state.js"></script>
    <script src="../assets/ui.js"></script>
    <script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
</head>
<body class="h-screen flex flex-col">
    <header class="tool-header">
        <div class="flex gap-2 items-center">
            <a href="../index.html" class="back-link">← Dashboard</a>
            <span style="color: var(--color-border)">|</span>
            <div class="tool-title">Gzip (Base64) Tool</div>
        </div>
        <div class="tool-actions">
            <button class="btn primary" onclick="JShellState.copyLink()">Share Link with Data</button>
        </div>
    </header>

    <div class="tool-container overflow-hidden flex-col">
        <div class="flex flex-grow overflow-hidden">
            <div class="editor-pane flex-1" id="inputPanel">
                <textarea id="plainText" placeholder="Paste text here to compress..." spellcheck="false"></textarea>
            </div>
            <div class="output-pane flex-1" id="outputPanel">
                <textarea id="compressedText" placeholder="Paste Gzip+Base64 here to decompress..." spellcheck="false"></textarea>
            </div>
        </div>
        <div id="stats" class="px-6 py-2 bg-header border-t border-border flex gap-8 text-[11px] font-mono text-text-muted">
            <div class="flex gap-2">CHARS: <span id="statChars" class="text-text-main">0</span></div>
            <div class="flex gap-2">PLAIN: <span id="statPlainBytes" class="text-text-main">0</span> B</div>
            <div class="flex gap-2">GZIPPED: <span id="statZipBytes" class="text-text-main">0</span> B</div>
            <div class="flex gap-2">RATIO: <span id="statRatio" class="text-text-main">0.00:1</span></div>
        </div>
    </div>

    <script>
        let plainInput, compressedInput;
        let statChars, statPlainBytes, statZipBytes, statRatio;

        function updateStats(plainStr, zipBytes) {
            const plainBytes = new TextEncoder().encode(plainStr).length;
            const zipCount = zipBytes.length;
            
            statChars.textContent = plainStr.length.toLocaleString();
            statPlainBytes.textContent = plainBytes.toLocaleString();
            statZipBytes.textContent = zipCount.toLocaleString();
            
            let ratio = 1.0;
            if (zipCount > 0 && plainBytes > 0) {
                ratio = (plainBytes / zipCount).toFixed(2);
            }
            
            statRatio.textContent = `${ratio}:1`;
            statRatio.parentElement.className = `flex gap-2 ${ratio > 1 ? 'text-success' : 'text-text-muted'}`;
        }

        function compress() {
            const val = plainInput.value;
            if (!val) {
                compressedInput.value = '';
                updateStats('', []);
                return;
            }

            try {
                const uint8 = new TextEncoder().encode(val);
                const compressed = pako.gzip(uint8);
                const base64 = btoa(String.fromCharCode.apply(null, compressed));
                compressedInput.value = base64;
                updateStats(val, compressed);
                JShellState.save({ t: val });
            } catch (e) {
                console.error("Compression error:", e);
            }
        }

        function decompress() {
            const val = compressedInput.value.trim();
            if (!val) {
                plainInput.value = '';
                updateStats('', []);
                return;
            }

            try {
                const binary = atob(val);
                const uint8 = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    uint8[i] = binary.charCodeAt(i);
                }
                const decompressed = pako.ungzip(uint8);
                const text = new TextDecoder().decode(decompressed);
                plainInput.value = text;
                updateStats(text, uint8);
                JShellState.save({ t: text });
            } catch (e) {
                // Silently fail or show error in output placeholder
            }
        }

        function applyTheme() {
            const theme = localStorage.getItem('jshell_theme') || 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
        }

        window.addEventListener('load', () => {
            JShellUI.initPanel('inputPanel', { label: 'Plain Text', paste: true, clear: true, copy: true });
            JShellUI.initPanel('outputPanel', { label: 'Gzip + Base64', paste: true, clear: true, copy: true });

            // Assign variables AFTER initPanel replaces the DOM
            plainInput = document.getElementById('plainText');
            compressedInput = document.getElementById('compressedText');
            statChars = document.getElementById('statChars');
            statPlainBytes = document.getElementById('statPlainBytes');
            statZipBytes = document.getElementById('statZipBytes');
            statRatio = document.getElementById('statRatio');

            // Attach listeners AFTER initPanel
            plainInput.addEventListener('input', compress);
            compressedInput.addEventListener('input', decompress);

            applyTheme();
            const state = JShellState.load();
            if (state && state.t) {
                plainInput.value = state.t;
                compress(); 
            } else {
                updateStats('', []);
            }
        });

        window.addEventListener('storage', (e) => { if(e.key === 'jshell_theme') applyTheme(); });
    </script>
</body>
</html>
