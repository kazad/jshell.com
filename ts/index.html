<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to TypeScript | JShell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/tool.css">
    <script src="../assets/lz-string.js"></script>
    <script src="../assets/state.js"></script>
    <script src="../assets/ui.js"></script>
</head>
<body>
    <header class="tool-header">
        <a href="../index.html" class="back-link">← Dashboard</a>
        <div class="tool-title">JSON to TypeScript</div>
        <div class="tool-actions">
            <button class="btn primary" onclick="JShellState.copyLink()">Copy Stateless Link</button>
            <button class="btn primary" onclick="generateTS()">Generate</button>
        </div>
    </header>

    <div class="tool-container">
        <div id="inputPanel" class="editor-pane">
            <textarea id="jsonInput" placeholder='Paste your JSON here...' spellcheck="false'></textarea>
        </div>
        <div id="outputPanel" class="output-pane">
            <textarea id="tsOutput" readonly placeholder="Result will appear here..." spellcheck="false"></textarea>
        </div>
        <div class="settings-pane p-4" style="width: 250px; border-left: 1px solid var(--color-border);">
            <div class="setting-group mb-4">
                <label class="text-[10px] font-extrabold tracking-widest uppercase text-text-muted mb-2 block">Root Interface Name</label>
                <input type="text" id="rootName" value="RootObject" style="background: var(--color-bg); color: var(--color-text-main); border: 1px solid var(--color-border); padding: 8px; border-radius: 4px; width: 100%; outline: none; font-family: 'JetBrains Mono', monospace; font-size: 12px;">
            </div>
            <div class="setting-group">
                <label class="text-[10px] font-extrabold tracking-widest uppercase text-text-muted mb-2 block">Info</label>
                <p style="font-size: 12px; color: var(--color-text-muted);">Converts JSON objects into TypeScript interfaces automatically.</p>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('jsonInput');
        const output = document.getElementById('tsOutput');
        const rootNameInput = document.getElementById('rootName');

        // Initialize JShell UI
        window.addEventListener('load', () => {
            JShellUI.initPanel('inputPanel', { label: 'Input JSON' });
            JShellUI.initPanel('outputPanel', { label: 'TypeScript Interface', type: 'output' });
        });

        function generateTS() {
            const val = input.value.trim();
            if (!val) { output.value = ''; return; }

            try {
                const parsed = JSON.parse(val);
                const interfaces = [];
                parseObject(parsed, rootNameInput.value || "RootObject", interfaces);
                output.value = interfaces.join('\n\n');

                JShellState.save({
                    input: val,
                    root: rootNameInput.value
                });
            } catch (e) {
                output.value = `Error: ${e.message}`;
            }
        }

        function parseObject(obj, name, interfaces) {
            if (obj === null || typeof obj !== 'object') return;
            
            let res = `interface ${name} {\n`;
            for (const key in obj) {
                const val = obj[key];
                const type = typeof val;
                
                if (val === null) {
                    res += `  ${key}: any;\n`;
                } else if (type === 'object' && !Array.isArray(val)) {
                    const subName = key.charAt(0).toUpperCase() + key.slice(1);
                    res += `  ${key}: ${subName};\n`;
                    parseObject(val, subName, interfaces);
                } else if (Array.isArray(val)) {
                    if (val.length > 0 && typeof val[0] === 'object') {
                        const subName = key.charAt(0).toUpperCase() + key.slice(1);
                        res += `  ${key}: ${subName}[];\n`;
                        parseObject(val[0], subName, interfaces);
                    } else {
                        res += `  ${key}: any[];\n`;
                    }
                } else {
                    res += `  ${key}: ${type};\n`;
                }
            }
            res += `}`;
            interfaces.push(res);
        }

        window.addEventListener('load', () => {
            const state = JShellState.load();
            if (state) {
                input.value = state.input || "";
                rootNameInput.value = state.root || "RootObject";
                generateTS();
            }
        });

        input.addEventListener('input', generateTS);

        function applyTheme() {
            const theme = localStorage.getItem('jshell_theme') || 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
        }
        window.addEventListener('load', applyTheme);
        window.addEventListener('storage', (e) => { if(e.key === 'jshell_theme') applyTheme(); });
    </script>
</body>
</html>
