  - generic [ref=e3]: Read words that zoom.
  - textbox [ref=e4]: Enter text to read (news article, essay, list) and press START. The words will fly by in groups. Try to read them without saying the words in your head. Once you are comfortable, use the arrow keys (up/down) to change the speed. Increase the speed until you can still understand the words, but aren't saying them in your head. This is a tough habit to break (I still haven't), but this is the theory of speed reading.
